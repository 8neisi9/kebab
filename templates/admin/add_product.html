{% extends "base.html" %}

{% block title %}Добавить товар - Админ панель - Shoe35{% endblock %}

{% block content %}
<div class="admin-container">
    <div class="admin-header">
        <h1><i class="fas fa-plus"></i> Добавить новый товар</h1>
    </div>
    
    <form method="POST" action="{{ url_for('add_product') }}">
        <div class="form-group">
            <label for="name">Название товара:</label>
            <input type="text" id="name" name="name" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="description">Описание:</label>
            <textarea id="description" name="description" class="form-control" rows="4" required></textarea>
        </div>
        
        <div class="form-group">
            <label for="price">Цена (₽):</label>
            <input type="number" id="price" name="price" class="form-control" step="0.01" min="0" required>
        </div>
        
        <div class="form-group">
            <label for="category">Категория:</label>
            <select id="category" name="category" class="form-control" required>
                <option value="">Выберите категорию</option>
                <option value="sneakers">Кроссовки</option>
                <option value="boots">Ботинки</option>
                <option value="formal">Туфли</option>
                <option value="casual">Повседневная обувь</option>
                <option value="sports">Спортивная обувь</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Доступные размеры:</label>
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
                {% for size in sizes %}
                <label style="display: flex; align-items: center; gap: 8px; color: #333;">
                    <input type="checkbox" name="sizes" value="{{ size }}">
                    {{ size }}
                </label>
                {% endfor %}
            </div>
        </div>
        
        <div class="form-group">
            <label for="color">Цвет:</label>
            <input type="text" id="color" name="color" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="material">Материал:</label>
            <input type="text" id="material" name="material" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="brand">Бренд:</label>
            <input type="text" id="brand" name="brand" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="main_image">URL главного изображения:</label>
            <input type="text" id="main_image" name="main_image" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="image2">URL второго изображения (опционально):</label>
            <input type="text" id="image2" name="image2" class="form-control">
        </div>
        
        <div class="form-group">
            <label for="image3">URL третьего изображения (опционально):</label>
            <input type="text" id="image3" name="image3" class="form-control">
        </div>
        
        <div class="form-group form-check">
            <input type="checkbox" id="available" name="available" class="form-check-input" checked>
            <label for="available" class="form-check-label">
                Товар в наличии
            </label>
        </div>
        
        <div class="form-actions" style="margin-top: 30px;">
            <button type="submit" class="btn">Добавить товар</button>
            <a href="{{ url_for('admin_panel') }}" class="btn btn-view">Отмена</a>
        </div>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('main_image').value = 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600&h=400&fit=crop';
    document.getElementById('image2').value = 'https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=600&h=400&fit=crop';
    document.getElementById('image3').value = 'https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?w=600&h=400&fit=crop';
});
</script>
{% endblock %}
