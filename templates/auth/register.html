{% extends "base.html" %}

{% block title %}Регистрация - Shoe35{% endblock %}

{% block content %}
<div class="auth-container">
    <h1 class="auth-title">Создать аккаунт</h1>

    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label for="username">Имя пользователя:</label>
            <input type="text" id="username" name="username" class="form-control" required
                   placeholder="Введите имя пользователя">
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" class="form-control" required
                   placeholder="Введите ваш email">
        </div>

        <div class="form-group">
            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" class="form-control" required
                   placeholder="Введите пароль">
        </div>

        <div class="form-group">
            <label for="confirm_password">Подтвердите пароль:</label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-control" required
                   placeholder="Повторите пароль">
        </div>

        <div class="form-group agreement-checkbox">
            <input type="checkbox" id="agreement" name="agreement" required>
            <label for="agreement" style="font-size: 11px; color: #666; line-height: 1.4;">
                Поставив галочку, вы соглашаетесь на обработку ваших
                <a href="{{ url_for('static', filename='docs/pers.pdf') }}"
                   target="_blank" rel="noopener"
                   style="color: #000; text-decoration: underline;">
                    персональных данных
                </a>
            </label>
        </div>

        <div class="form-group" style="margin-top: 5px;">
            <button type="submit" class="btn" style="width: 100%; padding: 12px;">
                Зарегистрироваться
            </button>
        </div>
    </form>

    <div class="auth-divider">
        <div class="divider-line"></div>
        <span>или</span>
        <div class="divider-line"></div>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <p style="color: #666; font-size: 12px; margin-bottom: 15px;">Уже есть аккаунт?</p>
        <a href="{{ url_for('login') }}" class="btn btn-view" style="width: 100%; padding: 10px;">
            Войти в аккаунт
        </a>
    </div>
</div>
{% endblock %}
