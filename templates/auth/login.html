{% extends "base.html" %}

{% block title %}Вход - Shoe35{% endblock %}

{% block content %}
<div class="auth-container">
    <h1 class="auth-title">Вход в аккаунт</h1>

    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="username">Имя пользователя:</label>
            <input type="text" id="username" name="username" class="form-control" required
                   placeholder="Введите имя пользователя">
        </div>

        <div class="form-group">
            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" class="form-control" required
                   placeholder="Введите пароль">
        </div>

        <div class="form-group" style="margin-top: 20px;">
            <button type="submit" class="btn" style="width: 100%; padding: 12px;">
                Войти
            </button>

            <div class="form-options" style="margin-top: 15px; text-align: center;">
                <a href="#" style="color: #666; font-size: 11px; text-decoration: none;">
                    Забыли пароль?
                </a>
            </div>
        </div>
    </form>

    <div class="auth-divider">
        <div class="divider-line"></div>
        <span>или</span>
        <div class="divider-line"></div>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <p style="color: #666; font-size: 12px; margin-bottom: 15px;">Нет аккаунта?</p>
        <a href="{{ url_for('register') }}" class="btn btn-view" style="width: 100%; padding: 10px;">
            Создать аккаунт
        </a>
    </div>

</div>
{% endblock %}
